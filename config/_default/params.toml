# Pages placed under these sections will be shown on homepage and archive page.
mainSections = ["post"]
# Output page's full content in RSS.
rssFullContent = true
favicon = "img/SSicon.png"

# Accepted values: "default", "lastmod"
# default = see https://gohugo.io/quick-reference/glossary/#default-sort-order
# lastmod = sort by last modified date, in descending order
SortBy = "default"

[footer]
since = 2020
customText = ""

[dateFormat]
published = ":date_full"
lastUpdated = ":date_full"

[sidebar]
emoji = "🍥"
subtitle = "不要停止学习"
avatar = "img/SaitoASUKA.png"

[article]
headingAnchor = false
math = false
readingTime = true

[article.license]
enabled = true
default = "Licensed under CC BY-NC-SA 4.0"

[widgets]
homepage = [
    { type = "search" },
    { type = "archives", params = { limit = 5 } },
    { type = "categories", params = { limit = 10 } },
    { type = "tag-cloud", params = { limit = 10 } },
]
page = [{ type = "toc" }]

[opengraph.twitter]
site = ""
card = "summary_large_image"

[colorScheme]
toggle = true
default = "auto"

## Comments
[comments]
enabled = true
provider = "giscus"

[comments.giscus]
repo = "somnus4214/somnus4214.github.io"
repoId = "R_kgDORvmqNA"
category = "Announcements"
categoryId = "DIC_kwDORvmqNM4C5i9x"
mapping = "pathname"
strict = "0"
reactionsEnabled = "1"
emitMetadata = "0"
inputPosition = "bottom"
lightTheme = "light"
darkTheme = "dark"
lang = "zh-CN"
